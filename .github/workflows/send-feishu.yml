name: 定时发送飞书消息

on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间9点
  workflow_dispatch:      # 支持手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 发送消息到飞书
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "Hello from GitHub Actions！现在时间是 '"$(date +"%Y-%m-%d %H:%M:%S")"'"
              }
            }' \
            ${{ secrets.FEISHU_URL }}
