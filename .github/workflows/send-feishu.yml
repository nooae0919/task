name: 定时发送飞书消息

on:
  schedule:
    - cron: '0 9 * * *'  # 每天上午9点执行（UTC时间，实际是北京时间17点，根据需求修改）
  workflow_dispatch:      # 支持手动触发

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 发送消息到飞书
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "定时消息：现在是北京时间'$(date +"%Y-%m-%d %H:%M:%S")'"
              }
            }' \
            $WEBHOOK